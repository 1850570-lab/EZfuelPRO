<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="ez2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="700" height="200" fill="#0D1117" rx="16"/>

  <!-- Badge: rounded square with EZ monogram -->
  <g transform="translate(60, 40)">
    <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#badge)"/>
    <!-- Wireframe rings inside badge, echoing the card -->
    <g opacity="0.28" stroke="#ffffff" stroke-width="1.2" fill="none">
      <ellipse cx="60" cy="60" rx="48" ry="12"/>
      <ellipse cx="60" cy="60" rx="48" ry="24"/>
      <ellipse cx="60" cy="60" rx="48" ry="36"/>
    </g>
    <text x="60" y="84" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900"
          font-size="66" fill="#ffffff" text-anchor="middle" letter-spacing="-4">EZ</text>
  </g>

  <!-- Wordmark -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" letter-spacing="-2">
    <text x="210" y="98" font-size="56" font-weight="900" fill="#ffffff">FUEL</text>
    <text x="345" y="62" font-size="18" font-weight="700" fill="#ffffff" opacity="0.75">&#8482;</text>
    <text x="210" y="148" font-size="26" font-weight="700" fill="url(#ez2)" letter-spacing="8">PRO</text>
    <text x="290" y="148" font-size="14" font-weight="500" fill="#9CA3AF" letter-spacing="4">FLEET FUEL CARD</text>
  </g>
</svg>
